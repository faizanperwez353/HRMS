spring.application.name=hrms-api

# Database Configuration (values injected via Render environment variables)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Configuration
hrms.app.jwtSecret=${JWT_SECRET:AntigravitySecretKeyForHRMSSystem2026SecureString}
hrms.app.jwtExpirationMs=86400000

# Logging
logging.level.org.springframework.security=DEBUG
