spring.application.name=hrms-api

# Server port - Render injects PORT env var, Spring Boot reads it via ${PORT}
server.port=${PORT:8080}

# Database - Spring Boot auto-binds SPRING_DATASOURCE_* env vars set on Render
# (no explicit ${} needed here - Render env vars override these defaults)
spring.datasource.url=jdbc:mysql://localhost:3306/hrms_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Configuration - Render env vars HRMS_APP_JWTSECRET / HRMS_APP_JWTEXPIRATIONMS override these
hrms.app.jwtSecret=AntigravitySecretKeyForHRMSSystem2026SecureString
hrms.app.jwtExpirationMs=86400000

# Logging
logging.level.org.springframework.security=DEBUG
