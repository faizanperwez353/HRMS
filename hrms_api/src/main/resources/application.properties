spring.application.name=hrms-api

# Server port - Render injects PORT env var
server.port=${PORT:8080}

# Database - Render injects SPRING_DATASOURCE_* via relaxed binding
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/hrms_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Force MySQL dialect so Hibernate doesn't need a live connection to auto-detect it
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration - Render injects HRMS_APP_JWTSECRET / HRMS_APP_JWTEXPIRATIONMS
hrms.app.jwtSecret=${HRMS_APP_JWTSECRET:AntigravitySecretKeyForHRMSSystem2026SecureString}
hrms.app.jwtExpirationMs=${HRMS_APP_JWTEXPIRATIONMS:86400000}

# Logging
logging.level.org.springframework.security=DEBUG
