spring.application.name=hrms-api

# Server port (Render injects $PORT dynamically)
server.port=${PORT:8080}

# Database Configuration (values injected via Render environment variables)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/hrms_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT Configuration
hrms.app.jwtSecret=${JWT_SECRET:AntigravitySecretKeyForHRMSSystem2026SecureString}
hrms.app.jwtExpirationMs=86400000

# Logging
logging.level.org.springframework.security=DEBUG
