spring.application.name=hrms-api

# Database Configuration
spring.datasource.url=jdbc:mysql://db:3306/hrms_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=hrms_user
spring.datasource.password=hrms_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
hrms.app.jwtSecret=AntigravitySecretKeyForHRMSSystem2026SecureString
hrms.app.jwtExpirationMs=86400000

# Logging
logging.level.org.springframework.security=DEBUG
