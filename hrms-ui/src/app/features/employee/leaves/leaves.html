<div class="employee-container fade-in">

    <!-- HEADER -->
    <div class="employee-header">
        <div>
            <h1 class="text-gradient">Apply for Leave</h1>
            <p class="text-muted">Submit your leave request</p>
        </div>
    </div>

    <div class="employee-grid">
        <div class="glass-card leave-form-card">
            <h3>Leave Details</h3>

            <form (ngSubmit)="submit()">

                <div class="form-group">
                    <label>Leave Type</label>
                    <select [(ngModel)]="leave.leaveType" name="leaveType">
                        <option>Sick Leave</option>
                        <option>Casual Leave</option>
                        <option>Paid Leave</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Start Date</label>
                        <input type="date" [(ngModel)]="leave.startDate" name="startDate" required />
                    </div>

                    <div class="form-group">
                        <label>End Date</label>
                        <input type="date" [(ngModel)]="leave.endDate" name="endDate" required />
                    </div>
                </div>

                <div class="form-group">
                    <label>Reason</label>
                    <textarea [(ngModel)]="leave.reason" name="reason"></textarea>
                </div>

                <button type="submit" class="submit-btn">
                    Submit Request
                </button>

            </form>
        </div>
        <div class="right-column">
            <div class="glass-card chart-card">
                <h3>Leave Balance</h3>
                <canvas #chartCanvas></canvas>
            </div>

        </div>

    </div>
</div>
